<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/><meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Reset Password — PrepIQ</title>
  <link rel="icon" type="image/svg+xml" href="../favicon.svg"/>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:ital,wght@0,300;0,400;0,500;1,300&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="../style.css"/><link rel="stylesheet" href="../auth.css"/>
</head>
<body class="auth-page">
  <a href="../auth.html" class="auth-back">← Back to Login</a>
  <div class="auth-wrapper" style="max-width:480px;min-height:auto">
    <div class="auth-right" style="padding:44px">
      <a href="../index.html" class="nav-logo auth-logo" style="margin-bottom:32px;display:flex"><span class="logo-icon">⚡</span>PrepIQ</a>
      <div class="form-header"><h3>Reset Password 🔒</h3><p>Enter your new password below.</p></div>
      <div id="rpSuccess" class="form-success" style="display:none"></div>
      <div id="rpError" class="form-error"></div>
      <div id="rpForm">
        <div class="form-group"><label>New Password</label>
          <div class="input-wrap"><span class="input-icon">🔒</span><input type="password" id="rpPw" placeholder="Min 8 characters"/></div>
        </div>
        <div class="form-group"><label>Confirm Password</label>
          <div class="input-wrap"><span class="input-icon">🔒</span><input type="password" id="rpConfirm" placeholder="Re-enter password"/></div>
        </div>
        <button class="btn-submit" id="rpBtn" type="button" onclick="handleReset()">
          <span>Reset Password</span><div class="btn-loader" id="rpLoader"></div>
        </button>
      </div>
    </div>
  </div>
  <script>
    const API = 'https://prepiq-steel.vercel.app';
    const token = new URLSearchParams(window.location.search).get('token');
    if (!token) { document.getElementById('rpError').textContent='Invalid reset link.'; document.getElementById('rpError').classList.add('visible'); document.getElementById('rpForm').style.display='none'; }
    async function handleReset() {
      const pw = document.getElementById('rpPw').value;
      const confirm = document.getElementById('rpConfirm').value;
      const errEl = document.getElementById('rpError');
      const btn = document.getElementById('rpBtn');
      const loader = document.getElementById('rpLoader');
      errEl.classList.remove('visible');
      if (pw.length < 8) { errEl.textContent='Password must be at least 8 characters.'; errEl.classList.add('visible'); return; }
      if (pw !== confirm) { errEl.textContent='Passwords do not match.'; errEl.classList.add('visible'); return; }
      btn.disabled=true; loader.style.display='block';
      try {
        const res = await fetch(`${API}/api/auth/reset-password`, { method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify({token, password:pw}) });
        const data = await res.json();
        if (!res.ok) { errEl.textContent=data.error; errEl.classList.add('visible'); return; }
        document.getElementById('rpForm').style.display='none';
        const suc = document.getElementById('rpSuccess');
        suc.style.display='block';
        suc.innerHTML='<strong>✅ Password reset!</strong><p>Redirecting to login...</p>';
        setTimeout(() => window.location.href='../auth.html', 2000);
      } catch(e) { errEl.textContent='Request failed.'; errEl.classList.add('visible'); }
      finally { btn.disabled=false; loader.style.display='none'; }
    }
  </script>
</body>
</html>
