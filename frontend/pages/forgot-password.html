<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/><meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Forgot Password — PrepIQ</title>
  <link rel="icon" type="image/svg+xml" href="../favicon.svg"/>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:ital,wght@0,300;0,400;0,500;1,300&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="../style.css"/><link rel="stylesheet" href="../auth.css"/>
</head>
<body class="auth-page">
  <a href="../auth.html" class="auth-back">← Back to Login</a>
  <div class="auth-wrapper" style="max-width:480px;min-height:auto">
    <div class="auth-right" style="padding:44px">
      <a href="../index.html" class="nav-logo auth-logo" style="margin-bottom:32px;display:flex"><span class="logo-icon">⚡</span>PrepIQ</a>
      <div class="form-header"><h3>Forgot Password 🔑</h3><p>Enter your email and we'll send you a reset link.</p></div>
      <div id="fpSuccess" class="form-success" style="display:none"></div>
      <div id="fpError" class="form-error"></div>
      <div id="fpForm">
        <div class="form-group"><label>Email Address</label>
          <div class="input-wrap"><span class="input-icon">✉️</span><input type="email" id="fpEmail" placeholder="you@example.com"/></div>
        </div>
        <button class="btn-submit" id="fpBtn" type="button" onclick="handleForgotPassword()">
          <span>Send Reset Link</span><div class="btn-loader" id="fpLoader"></div>
        </button>
      </div>
      <p class="auth-switch">Remembered it? <a href="../auth.html">Login here</a></p>
    </div>
  </div>
  <script>
    const API = 'https://prepiq-steel.vercel.app';
    async function handleForgotPassword() {
      const email = document.getElementById('fpEmail').value.trim();
      const btn = document.getElementById('fpBtn');
      const loader = document.getElementById('fpLoader');
      const errEl = document.getElementById('fpError');
      const sucEl = document.getElementById('fpSuccess');
      if (!email) { errEl.textContent='Email is required.'; errEl.classList.add('visible'); return; }
      errEl.classList.remove('visible'); btn.disabled=true; loader.style.display='block';
      try {
        const res = await fetch(`${API}/api/auth/forgot-password`, { method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify({email}) });
        const data = await res.json();
        document.getElementById('fpForm').style.display='none';
        sucEl.style.display='block';
        sucEl.innerHTML = `<strong>✅ Check your email!</strong><p>${data.message}</p>`;
      } catch(e) {
        errEl.textContent='Request failed. Make sure the backend is running.'; errEl.classList.add('visible');
      } finally { btn.disabled=false; loader.style.display='none'; }
    }
    document.addEventListener('keydown', e => { if(e.key==='Enter') handleForgotPassword(); });
  </script>
</body>
</html>
